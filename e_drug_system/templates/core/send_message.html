{% extends 'base.html' %}

{% block title %}Send Message - E-Drug System{% endblock %}

{% block content %}
<div class="page-header">
    <div class="container">
        <h1>Send Message</h1>
        <p>Send a message to a user</p>
        <a href="{% url 'moderator_dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="message-form-container">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="receiver">Recipient</label>
                <select name="receiver" id="receiver" required>
                    <option value="">Select a user...</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }} ({{ user.get_role_display }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="content">Message</label>
                <textarea name="content" id="content" rows="5" required placeholder="Write your message here..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Send Message</button>
                <a href="{% url 'moderator_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
