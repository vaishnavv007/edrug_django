{% extends 'base.html' %}

{% block title %}Send Message - E-Drug System{% endblock %}

{% block content %}

<style>
/* =========================
   PAGE HEADER
========================= */
.page-header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    padding: 50px 40px;
    border-radius: 18px;
    margin: 20px auto 40px;
    box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.25);
    text-align: center;
}

.page-header h1 {
    font-size: clamp(2rem, 4vw, 2.8rem);
    font-weight: 800;
    margin-bottom: 10px;
    line-height: 1.2;
}

.page-header p {
    opacity: 0.9;
    font-size: 1.1rem;
    margin-bottom: 15px;
}

/* Back button spacing */
.page-header .btn {
    margin-top: 10px;
}

/* =========================
   CONTAINER
========================= */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
}

/* =========================
   FORM CARD
========================= */
.message-form-container {
    background: #ffffff;
    border-radius: 18px;
    padding: 32px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    border: 1px solid #e5e7eb;
}

/* =========================
   FORM GROUP
========================= */
.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 8px;
    color: #1f2937;
}

/* =========================
   SELECT DROPDOWN
========================= */
select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    background: #fff;
    font-size: 1rem;
    font-family: inherit;
    color: #111827;
    transition: all 0.2s ease;
    cursor: pointer;
}

select:focus {
    outline: none;
    border-color: #4f46e5;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
}

/* =========================
   TEXTAREA
========================= */
textarea {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #d1d5db;
    font-size: 1rem;
    font-family: inherit;
    resize: vertical;
    min-height: 150px;
    transition: all 0.2s ease;
    background: #fff;
}

textarea:focus {
    outline: none;
    border-color: #4f46e5;
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
}

/* =========================
   FORM ACTIONS
========================= */
.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 25px;
}

/* =========================
   PRIMARY BUTTON
========================= */
.btn-primary {
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    border: none;
    text-decoration: none;
    transition: all 0.2s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(79, 70, 229, 0.25);
}

/* =========================
   SECONDARY BUTTON
========================= */
.btn-secondary {
    background: #f1f5f9;
    color: #334155;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    border: 1px solid #e2e8f0;
    text-decoration: none;
    transition: all 0.2s ease;
}

.btn-secondary:hover {
    background: #e2e8f0;
}

/* =========================
   CARD HOVER FEEL (optional polish)
========================= */
.message-form-container:hover {
    box-shadow: 0 12px 35px rgba(0,0,0,0.08);
}

/* =========================
   RESPONSIVE
========================= */
@media (max-width: 768px) {
    .page-header {
        padding: 30px 20px;
    }

    .message-form-container {
        padding: 22px;
    }

    .form-actions {
        flex-direction: column;
    }

    .btn-primary,
    .btn-secondary {
        width: 100%;
        text-align: center;
    }
}
</style>

<div class="page-header">
    <div class="container">
        <h1>Send Message</h1>
        <p>Send a message to a user</p>
        <a href="{% url 'moderator_dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</div>

<div class="container">
    <div class="message-form-container">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="receiver">Recipient</label>
                <select name="receiver" id="receiver" required>
                    <option value="">Select a user...</option>
                    {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }} ({{ user.get_role_display }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="content">Message</label>
                <textarea name="content" id="content" rows="5" required placeholder="Write your message here..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Send Message</button>
                <a href="{% url 'moderator_dashboard' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
